name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          # Dummy values so the production build compiles without real services.
          AUTH0_SECRET: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
          APP_BASE_URL: http://localhost:3000
          AUTH0_DOMAIN: example.us.auth0.com
          AUTH0_CLIENT_ID: ci-dummy
          AUTH0_CLIENT_SECRET: ci-dummy
          BUNNY_LIBRARY_ID: '1'
          BUNNY_API_KEY: ci-dummy
          BUNNY_TOKEN_AUTH_KEY: ci-dummy
          ADMIN_EMAILS: admin@example.com
          KV_REST_API_URL: https://example.upstash.io
          KV_REST_API_TOKEN: ci-dummy
